services:
  postgres:
    image: postgres:16-alpine
    container_name: bookmark-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-bookmark}
      POSTGRES_USER: ${POSTGRES_USER:-bookmark}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-bookmark_dev_pw}
    ports:
      - "5432:5432"
    volumes:
      - bookmark-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-bookmark} -d ${POSTGRES_DB:-bookmark}"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  bookmark-pgdata:
