spring:
  application:
    name: bookmark
  profiles:
    # Default profile uses H2 file mode (no Docker/Postgres install required).
    # Switch to PostgreSQL with: --spring.profiles.active=postgres
    default: local
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET}
            # Force the OAuth callback to come back through the frontend host so
            # the browser keeps using the same JSESSIONID cookie throughout the
            # flow. Without this Spring builds redirect_uri from its own host
            # (Railway), the post-Google callback hits Railway directly, and the
            # vercel.app-scoped session cookie isn't sent — Spring then 401s with
            # "authorization_request_not_found". Must match a URI registered in
            # Google Cloud Console for this client.
            redirect-uri: ${FRONTEND_URL:http://localhost:5173}/login/oauth2/code/google
            scope:
              - email
              - profile
              - openid

server:
  # Railway and most PaaSes inject $PORT; 8081 stays as the local default.
  port: ${PORT:8081}
  # Honor X-Forwarded-* from Railway's load balancer so OAuth2 callback URLs
  # and absolute redirects use HTTPS / the public host, not the internal one.
  forward-headers-strategy: framework
  servlet:
    session:
      # Tomcat default is 30 min — too short for users who leave the tab open
      # all day. With OAuth2 backed by Google there's no password to remember;
      # the only real risk of a long session is a stolen device, and we still
      # invalidate on explicit logout. JSESSIONID cookie max-age must match so
      # browsers persist it past tab/browser close. Secure flag is left to
      # Spring's auto-inference (HTTPS prod via X-Forwarded-Proto=https,
      # plain http on localhost) so local dev keeps working.
      timeout: 30d
      cookie:
        max-age: 30d
        http-only: true
  # Surface ResponseStatusException reason text in the JSON error body so the
  # frontend can display "선택한 책장이 가득 찼습니다." instead of an opaque
  # "Request failed with status code 409". Kept on always — our backend only
  # throws explicit, user-facing messages (no leaking of stack info).
  error:
    include-message: always
    include-binding-errors: always

app:
  frontend:
    url: ${FRONTEND_URL:http://localhost:5173}
  spa:
    # Path the SSR'd /u/{user}/{slug} HTML uses for its <script> bootstrap. In
    # production set SPA_SCRIPT_URL to the hashed bundle path produced by
    # `vite build`; the dev default points at Vite's source entry.
    script-url: ${SPA_SCRIPT_URL:/src/main.tsx}

---
spring:
  config:
    activate:
      on-profile: local
  datasource:
    url: jdbc:h2:file:./data/bookmark;AUTO_SERVER=TRUE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
  h2:
    console:
      enabled: true
      path: /h2-console

---
spring:
  config:
    activate:
      on-profile: postgres
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:bookmark}
    driver-class-name: org.postgresql.Driver
    username: ${DB_USERNAME:bookmark}
    password: ${DB_PASSWORD:bookmark_dev_pw}
  jpa:
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
