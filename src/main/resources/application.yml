spring:
  application:
    name: bookmark
  profiles:
    # Default profile uses H2 file mode (no Docker/Postgres install required).
    # Switch to PostgreSQL with: --spring.profiles.active=postgres
    default: local
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET}
            scope:
              - email
              - profile
              - openid

server:
  port: 8081
  # Surface ResponseStatusException reason text in the JSON error body so the
  # frontend can display "선택한 책장이 가득 찼습니다." instead of an opaque
  # "Request failed with status code 409". Kept on always — our backend only
  # throws explicit, user-facing messages (no leaking of stack info).
  error:
    include-message: always
    include-binding-errors: always

app:
  frontend:
    url: ${FRONTEND_URL:http://localhost:5173}

---
spring:
  config:
    activate:
      on-profile: local
  datasource:
    url: jdbc:h2:file:./data/bookmark;AUTO_SERVER=TRUE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
  h2:
    console:
      enabled: true
      path: /h2-console

---
spring:
  config:
    activate:
      on-profile: postgres
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:bookmark}
    driver-class-name: org.postgresql.Driver
    username: ${DB_USERNAME:bookmark}
    password: ${DB_PASSWORD:bookmark_dev_pw}
  jpa:
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
